<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shark Escape Game</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    overflow: hidden;
    height: 100vh;
    background: linear-gradient(180deg, #1b3c5a, #0b1e2d);
    font-family: Arial, sans-serif;
  }

  /* Ocean bubbles */
  .bubble {
    position: absolute;
    bottom: -50px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    animation: rise 10s infinite ease-in;
  }

  @keyframes rise {
    0% {
      transform: translateY(0);
      opacity: 0.3;
    }
    100% {
      transform: translateY(-110vh);
      opacity: 0;
    }
  }

  /* Shark */
  #shark {
    position: absolute;
    width: 120px;
    height: 60px;
    cursor: pointer;
    transition: transform 0.2s ease;
  }

  #shark:hover {
    transform: scale(1.1);
  }

  /* Hint text */
  .hint {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px;
    opacity: 0.8;
  }
</style>
</head>

<body>

<div class="hint">🐟 Click the shark and watch it swim away!</div>

<!-- Shark SVG -->
<svg id="shark" viewBox="0 0 200 100">
  <path d="M10,50 
           Q60,10 120,30 
           Q150,40 180,20 
           Q170,50 180,80 
           Q150,60 120,70 
           Q60,90 10,50 Z"
        fill="#a0c4ff" stroke="#ffffff" stroke-width="2"/>

  <!-- eye -->
  <circle cx="60" cy="45" r="5" fill="black"/>
</svg>

<script>
const shark = document.getElementById("shark");

// starting position
let x = window.innerWidth / 2;
let y = window.innerHeight / 2;

shark.style.left = x + "px";
shark.style.top = y + "px";

function moveSharkAway() {
  // random direction away
  const angle = Math.random() * Math.PI * 2;
  const distance = 200 + Math.random() * 300;

  x += Math.cos(angle) * distance;
  y += Math.sin(angle) * distance;

  // keep inside screen bounds
  x = Math.max(0, Math.min(window.innerWidth - 120, x));
  y = Math.max(0, Math.min(window.innerHeight - 60, y));

  shark.style.transition = "transform 0.6s ease-out, left 0.6s ease-out, top 0.6s ease-out";
  shark.style.left = x + "px";
  shark.style.top = y + "px";

  // swim direction tilt
  shark.style.transform = `rotate(${angle}rad)`;
}

shark.addEventListener("click", moveSharkAway);

// create bubbles
function createBubbles() {
  for (let i = 0; i < 25; i++) {
    let bubble = document.createElement("div");
    bubble.className = "bubble";

    let size = Math.random() * 20 + 10;
    bubble.style.width = size + "px";
    bubble.style.height = size + "px";

    bubble.style.left = Math.random() * window.innerWidth + "px";
    bubble.style.animationDuration = (5 + Math.random() * 10) + "s";
    bubble.style.animationDelay = Math.random() * 5 + "s";

    document.body.appendChild(bubble);
  }
}

createBubbles();
</script>

</body>
</html>
