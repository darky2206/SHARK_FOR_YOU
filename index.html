<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shark Cursor Follower</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  background: linear-gradient(to bottom, #0a2a43, #1c5f7a);
}

/* Ocean effect */
.ocean {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,255,255,0.05) 10%, transparent 10%);
  background-size: 80px 80px;
  animation: move 10s linear infinite;
}

@keyframes move {
  from {background-position: 0 0;}
  to {background-position: 100px 100px;}
}

/* Shark */
#shark {
  position: absolute;
  width: 120px;
  pointer-events: none;
  transform: translate(-50%, -50%);
  transition: 0.08s linear;
}
</style>
</head>

<body>

<div class="ocean"></div>

<!-- Shark image -->
<img id="shark" src="https://i.imgur.com/6X1GQ8M.png">

<script>
const shark = document.getElementById("shark");

let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;

// Mouse move (PC)
document.addEventListener("mousemove", (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

// Touch move (Phone)
document.addEventListener("touchmove", (e) => {
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
});

// Smooth follow animation
function animate() {
  shark.style.left = mouseX + "px";
  shark.style.top = mouseY + "px";
  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
