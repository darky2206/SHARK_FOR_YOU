<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shark Escape Game</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    overflow: hidden;
    height: 100vh;
    background: linear-gradient(180deg, #1b3c5a, #0b1e2d);
    font-family: Arial, sans-serif;
  }

  /* Ocean bubbles */
  .bubble {
    position: absolute;
    bottom: -50px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    animation: rise 10s infinite ease-in;
  }

  @keyframes rise {
    0% { transform: translateY(0); opacity: 0.3; }
    100% { transform: translateY(-110vh); opacity: 0; }
  }

  /* Shark image */
  #shark {
    position: absolute;
    width: 140px;
    height: auto;
    cursor: pointer;
    transition: transform 0.6s ease-out, left 0.6s ease-out, top 0.6s ease-out;
    filter: drop-shadow(0px 10px 10px rgba(0,0,0,0.4));
  }

  #shark:hover {
    transform: scale(1.1);
  }

  .hint {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px;
    opacity: 0.8;
  }
</style>
</head>

<body>

<div class="hint">🦈 Click the shark and watch it swim away!</div>

<!-- REAL SHARK IMAGE -->
<img id="shark"
     src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/56/White_shark.jpg/640px-White_shark.jpg"
     alt="shark" />

<script>
const shark = document.getElementById("shark");

let x = window.innerWidth / 2;
let y = window.innerHeight / 2;

shark.style.left = x + "px";
shark.style.top = y + "px";

function moveSharkAway() {
  const angle = Math.random() * Math.PI * 2;
  const distance = 250 + Math.random() * 400;

  x += Math.cos(angle) * distance;
  y += Math.sin(angle) * distance;

  x = Math.max(0, Math.min(window.innerWidth - 140, x));
  y = Math.max(0, Math.min(window.innerHeight - 100, y));

  shark.style.left = x + "px";
  shark.style.top = y + "px";

  shark.style.transform = `rotate(${angle}rad) scale(1.1)`;
}

shark.addEventListener("click", moveSharkAway);

// bubbles
function createBubbles() {
  for (let i = 0; i < 25; i++) {
    let bubble = document.createElement("div");
    bubble.className = "bubble";

    let size = Math.random() * 20 + 10;
    bubble.style.width = size + "px";
    bubble.style.height = size + "px";

    bubble.style.left = Math.random() * window.innerWidth + "px";
    bubble.style.animationDuration = (5 + Math.random() * 10) + "s";
    bubble.style.animationDelay = Math.random() * 5 + "s";

    document.body.appendChild(bubble);
  }
}

createBubbles();
</script>

</body>
</html>
