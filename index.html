<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shark Ocean Interaction</title>

<style>
/* 🌊 Ocean background */
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: linear-gradient(to bottom, #8fb3c9, #5f7f92);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
}

/* 🦈 Shark */
#shark {
  font-size: 120px;
  transition: transform 0.4s ease;
}

/* Text */
#text {
  position: absolute;
  bottom: 40px;
  color: white;
  font-size: 18px;
  opacity: 0.9;
}
</style>
</head>

<body>

<!-- 🦈 Shark (emoji version so NOTHING breaks) -->
<div id="shark">🦈</div>

<div id="text">Touch and hold the screen 🌊</div>

<script>
let shark = document.getElementById("shark");
let timeout;

// Touch interaction (mobile)
document.addEventListener("touchstart", () => {
  shark.style.transform = "scale(1.2) rotate(-8deg)";
  clearTimeout(timeout);
});

document.addEventListener("touchend", () => {
  timeout = setTimeout(() => {
    shark.style.transform = "scale(1) rotate(0deg)";
  }, 500);
});

// Mouse support (laptop)
document.addEventListener("mousedown", () => {
  shark.style.transform = "scale(1.2) rotate(-8deg)";
  clearTimeout(timeout);
});

document.addEventListener("mouseup", () => {
  timeout = setTimeout(() => {
    shark.style.transform = "scale(1) rotate(0deg)";
  }, 500);
});
</script>

</body>
</html>
