<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Shark Escape (Mobile)</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    overflow: hidden;
    height: 100vh;
    touch-action: none;
    background: linear-gradient(180deg, #1b3c5a, #081521);
  }

  /* subtle moving ocean effect */
  body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.05), transparent 40%);
    animation: drift 12s linear infinite;
  }

  @keyframes drift {
    0% { transform: translate(0,0); }
    100% { transform: translate(-10%, -10%); }
  }

  .hint {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 16px;
    opacity: 0.8;
    z-index: 10;
    font-family: Arial;
  }

  #shark {
    position: absolute;
    width: 130px;
    height: auto;
    user-select: none;
    -webkit-user-drag: none;
    filter: drop-shadow(0px 10px 10px rgba(0,0,0,0.5));
    transition: transform 0.5s ease-out, left 0.5s ease-out, top 0.5s ease-out;
    z-index: 5;
  }

  .bubble {
    position: absolute;
    bottom: -50px;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    animation: rise linear infinite;
  }

  @keyframes rise {
    0% { transform: translateY(0); opacity: 0.3; }
    100% { transform: translateY(-110vh); opacity: 0; }
  }
</style>
</head>

<body>

<div class="hint">🦈 Tap the shark to make it swim away!</div>

<img id="shark"
     src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/56/White_shark.jpg/640px-White_shark.jpg"
     alt="shark" />

<script>
const shark = document.getElementById("shark");

let x = window.innerWidth / 2;
let y = window.innerHeight / 2;

function placeShark() {
  shark.style.left = x + "px";
  shark.style.top = y + "px";
}

placeShark();

function moveShark() {
  const angle = Math.random() * Math.PI * 2;
  const distance = 250 + Math.random() * 400;

  x += Math.cos(angle) * distance;
  y += Math.sin(angle) * distance;

  // keep inside screen
  x = Math.max(0, Math.min(window.innerWidth - 130, x));
  y = Math.max(0, Math.min(window.innerHeight - 130, y));

  shark.style.left = x + "px";
  shark.style.top = y + "px";

  shark.style.transform = `rotate(${angle}rad) scale(1.05)`;
}

/* MOBILE FRIENDLY EVENTS */
shark.addEventListener("touchstart", (e) => {
  e.preventDefault();
  moveShark();
});

shark.addEventListener("click", moveShark);

/* bubbles */
function createBubbles() {
  for (let i = 0; i < 20; i++) {
    let b = document.createElement("div");
    b.className = "bubble";

    let size = Math.random() * 18 + 8;
    b.style.width = size + "px";
    b.style.height = size + "px";

    b.style.left = Math.random() * window.innerWidth + "px";
    b.style.animationDuration = (6 + Math.random() * 8) + "s";
    b.style.animationDelay = Math.random() * 5 + "s";

    document.body.appendChild(b);
  }
}

createBubbles();

/* reposition on rotate */
window.addEventListener("resize", () => {
  x = window.innerWidth / 2;
  y = window.innerHeight / 2;
  placeShark();
});
</script>

</body>
</html>
